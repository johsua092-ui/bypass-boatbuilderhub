<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Boat Builder Hub Bypass</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: #121212; color: #00ff99; }
    h1 { font-size: 2em; margin-bottom: 20px; }
    p { font-size: 1.2em; }
    button { padding: 15px 30px; font-size: 1em; background: #00ff99; color: #000; border: none; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Boat Builder Hub Bypass</h1>
  <p>Klik tombol di bawah untuk unlock premium otomatis:</p>
  <button onclick="startBypass()">🚀 Unlock Premium</button>

  <script>
    async function startBypass() {
      try {
        const key = await getKeyFromLinkvertise();
        injectBypassScript(key);
        alert("✅ Premium unlocked! Refresh Roblox jika perlu.");
      } catch (error) {
        alert("❌ Gagal unlock premium: " + error.message);
      }
    }

    async function getKeyFromLinkvertise() {
      const url = "https://ads.luarmor.net/get_key?for=BoatBuilderHub_Linkvertise-RMgzLzWbeeYz";
      const response = await fetch(url, { method: "GET", redirect: "follow" });
      const finalUrl = response.url;

      const match = finalUrl.match(/key=([^&]+)/);
      if (!match) throw new Error("Key tidak ditemukan di URL.");
      return match[1];
    }

    function injectBypassScript(key) {
      const script = document.createElement("script");
      script.textContent = `
        (function() {
          const xeno = getgenv().xeno;
          if (!xeno) throw new Error("Xeno 1.3.25b diperlukan!");

          // Unlock premium
          xeno.hook({ name: "isPremium", callback: () => true });
          xeno.hook({ name: "validate", callback: () => true });

          // Inject key
          loadstring(game:HttpGet("https://raw.githubusercontent.com/catblox1346/StensUIReMake/refs/heads/main/Script/boatbuilderhub_B1", true))();
          game:GetService("Players").LocalPlayer:WaitForChild("PlayerGui"):WaitForChild("BoatBuilderHub"):WaitForChild("Frame"):WaitForChild("KeyInput").Text = "${key}";
          game:GetService("Players").LocalPlayer:WaitForChild("PlayerGui"):WaitForChild("BoatBuilderHub"):WaitForChild("Frame"):WaitForChild("Submit").Click:Fire();
        })();
      `;
      document.body.appendChild(script);
    }
  </script>
</body>
</html>
