<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kirim Pesan WA Tanpa Identitas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #121212;
      color: #00ff99;
      text-align: center;
      padding: 50px;
    }
    input, button {
      padding: 10px;
      margin: 10px;
      font-size: 1em;
    }
    button {
      background: #00ff99;
      color: #000;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Kirim Pesan WA Tanpa Identitas</h1>
  <p>Isi nomor WA tujuan dan pesan, lalu klik tombol di bawah:</p>
  <input type="text" id="nomor" placeholder="Nomor WA (628xxxx)" />
  <br/>
  <textarea id="pesan" placeholder="Pesan yang akan dikirim..." rows="4" cols="50"></textarea>
  <br/>
  <button onclick="kirimPesan()">🚀 Kirim Pesan</button>
  <p id="status"></p>

  <script>
    async function kirimPesan() {
      const nomor = document.getElementById("nomor").value.trim();
      const pesan = document.getElementById("pesan").value.trim();
      const status = document.getElementById("status");

      if (!nomor || !pesan) {
        status.textContent = "❌ Nomor dan pesan harus diisi!";
        return;
      }

      try {
        const response = await fetch("https://api.example.com/kirim-wa", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nomor, pesan })
        });

        if (response.ok) {
          status.textContent = "✅ Pesan berhasil dikirim!";
        } else {
          status.textContent = "❌ Gagal mengirim pesan.";
        }
      } catch (error) {
        status.textContent = "❌ Error: " + error.message;
      }
    }
  </script>
</body>
</html>
